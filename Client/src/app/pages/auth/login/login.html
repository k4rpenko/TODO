<div class="container vh-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="row d-flex justify-content-center align-items-center h-100 flex-row-reverse">
            <div class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2">
                <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp" class="img-fluid" alt="Sample image">
            </div>
            <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
                <form class="mx-1 mx-md-4" (ngSubmit)="onSubmit()">
                    <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">Sign in</p>


                    <div class="d-flex flex-row align-items-center mb-4">
                    <div data-mdb-input-init class="form-outline flex-fill mb-0">
                        <input type="email" id="form3Example3c" class="form-control" [(ngModel)]="email" placeholder="Email" name="email" required/>
                        <label class="form-label" for="form3Example3c">Your Email</label>
                    </div>
                    </div>

                    <div class="d-flex flex-row align-items-center mb-4">
                    <div data-mdb-input-init class="form-outline flex-fill mb-0">
                        <input type="password" id="form3Example4c" class="form-control" [(ngModel)]="password" placeholder="Password" name="password" required/>
                        <label class="form-label" for="form3Example4c">Password</label>
                    </div>
                    </div>


                    <a [routerLink]="['/register']" class="d-flex justify-content-center mb-5" style="cursor: pointer;">
                        I don't have an account; I want to register
                    </a>

                    <div *ngIf="Error" class="d-flex flex-row align-items-center justify-content-center mb-4 p-2 rounded-2 auth-error">
                        <span>{{ Error }}</span>
                    </div>

                    <div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                        <button type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-lg">Login</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
