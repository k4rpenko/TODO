    <header class="d-flex p-3 px-5 mb-3 border-bottom justify-content-between align-items-center">
        <div class="d-flex align-items-center me-3 mb-2 mb-lg-0 text-dark text-decoration-none">
            <button class="btn d-flex align-items-center justify-content-center menu-btn" type="button" (click)="toggleMenu()" aria-expanded="false">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" class="bi bi-list" viewBox="0 0 16 16">`
                    <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
                </svg>
            </button>
        </div>
        <button class="btn p-0 border-0 bg-transparent"  (click)="toggle_profile_Menu()" >
            <img
                src="Happy.png"
                class="rounded-4"
                width="50"
                height="50"
                alt="Profile">
        </button>

            <li>
                <a class="dropdown-item d-flex gap-2 align-items-center" cursor="pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16">
                        <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                    </svg>
                    Profile
                </a>
            </li>

            <li>
                <a (click)="Logout()" class="dropdown-item d-flex gap-2 align-items-center" cursor="pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-left" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M6 12.5a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-8a.5.5 0 0 0-.5.5v2a.5.5 0 0 1-1 0v-2A1.5 1.5 0 0 1 6.5 2h8A1.5 1.5 0 0 1 16 3.5v9a1.5 1.5 0 0 1-1.5 1.5h-8A1.5 1.5 0 0 1 5 12.5v-2a.5.5 0 0 1 1 0z"/>

                    Logout
                </a>
            </li>
        </ul>
    </div>

        <ul class="dropdown-menu d-block mx-0 shadow w-50px" data-bs-theme="light">
            <li>
                <a class="dropdown-item d-flex gap-2 align-items-center" cursor="pointer">
